<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>限界大学生の学食ナビ - 基本情報入力</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f5f5f5;
      font-family: sans-serif;
      overflow: auto;
    }

    .container {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      height: 100vh;
      padding: 16px;
      position: relative;
      transition: padding-bottom 0.2s;
    }

    .container.has-bottom-nav {
      padding-bottom: calc(86px + env(safe-area-inset-bottom));
    }

    /* =========================
       進行バー
    ========================= */
    .progress-container {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .progress-step {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: #ddd;
      transition: 0.3s;
    }

    .progress-step.active {
      background: #ff5722;
    }

    /* =========================
       カード共通
    ========================= */
    /* .card {
      background: white;
      border-radius: 28px;
      padding: 30px 24px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
      height: calc(100vh - 105px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    } */


    .page {
      min-height: calc(100vh - 32px);
      padding: 0;
    }

    #selectMenuPage {
      padding-bottom: 90px;
    }

    /* 一覧・詳細・タブ系ページは中央寄せせず上から表示 */
    #selectMenuPage .card,
    #detailPage .card,
    #todayPage .card,
    #aiPage .card,
    #mypagePage .card {
      height: auto;
      min-height: calc(100vh - 40px);
      justify-content: flex-start;
    }

    .question {
      display: none;
    }

    .question.active {
      display: block;
    }

    label {
      display: block;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 40px;
    }

    /* =========================
       性別ボタン
    ========================= */
    .gender-buttons {
      display: flex;
      gap: 16px;
    }

    .gender-btn {
      flex: 1;
      border: none;
      border-radius: 20px;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      background: #e5e5e5;
      transition: 0.2s;
      cursor: pointer;
    }

    .gender-btn:hover {
      background: #d8d8d8;
    }

    .gender-btn.selected {
      background: #ff5722;
      color: white;
    }

    /* =========================
       select
    ========================= */
    select {
      width: 100%;
      padding: 20px;
      border-radius: 20px;
      border: 1px solid #ddd;
      font-size: 22px;
      background: white;
    }

    /* =========================
       次へボタン / 共通ボタン
    ========================= */
    .button-area {
      margin-top: 40px;
    }

    .next-btn {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border: none;
      border-radius: 20px;
      background: #e0e0e0;
      color: #999;
      cursor: not-allowed;
      transition: 0.2s;
    }

    .next-btn.enabled {
      background: #ff5722;
      color: white;
      cursor: pointer;
    }

    /* =========================
       スマホ最適化
    ========================= */
    @media (max-height: 750px) {
      label {
        font-size: 24px;
        margin-bottom: 28px;
      }
    }

    /* =========================
       学食一覧ページ見出し
    ========================= */
    #selectMenuPage h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    /* =========================
       SmartNews風 横スクロールタブ
    ========================= */
    .tab-bar {
      display: flex;
      gap: 4px;
      overflow-x: scroll;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;

      width: calc(100% + 48px);
      max-width: none;

      margin: 0 -24px 16px;
      padding: 0 24px;

      border-bottom: 1px solid #eee;
      scrollbar-width: none;
    }

    .tab-bar::-webkit-scrollbar {
      display: none;
    }

    .tab-item {
      flex: 0 0 auto;
      appearance: none;
      border: none;
      background: none;
      padding: 10px 14px 12px;
      font-size: 15px;
      font-weight: bold;
      color: #aaa;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab-item:hover {
      color: #ff5722;
    }

    .tab-item.active {
      color: #ff5722;
      border-bottom-color: #ff5722;
    }

    /* =========================
       学食一覧（メニューカード）
    ========================= */
    #menuList {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-content: start;
    }

    .menu-item {
      background: #f7f7f7;
      border: 1px solid #ddd;
      border-radius: 18px;
      min-height: 112px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: left;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu-item:hover {
      background: #fff5f2;
      border-color: #ff5722;
    }

    .menu-item .menu-name {
      font-size: 15px;
      font-weight: bold;
      line-height: 1.35;
    }

    .menu-item .menu-tags {
      margin-top: 6px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tag-badge {
      font-size: 10px;
      font-weight: bold;
      color: #ff5722;
      background: #ffe3da;
      border-radius: 6px;
      padding: 2px 6px;
      white-space: nowrap;
    }

    .menu-item .menu-meta {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .menu-item .menu-price {
      font-size: 17px;
      font-weight: bold;
      color: #ff5722;
    }

    .menu-item .menu-kcal {
      font-size: 11px;
      color: #999;
    }

    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      color: #999;
      font-size: 14px;
      padding: 30px 0;
    }

    /* =========================
       メニュー詳細ページ
    ========================= */
    .back-link {
      background: none;
      border: none;
      color: #ff5722;
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 12px;
      cursor: pointer;
      padding: 6px 0;
    }

    .detail-hero {
      width: 100%;
      height: 160px;
      border-radius: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      background: linear-gradient(135deg, #ffe3da, #ffb199);
    }

    #detailTitle {
      font-size: 24px;
      margin: 0 0 4px;
    }

    .detail-category {
      font-size: 13px;
      color: #999;
      margin-bottom: 12px;
    }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .detail-price {
      font-size: 26px;
      font-weight: bold;
      color: #ff5722;
    }

    .detail-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .nutrition-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .nutrition-item {
      background: #f7f7f7;
      border-radius: 14px;
      padding: 10px 6px;
      text-align: center;
    }

    .nutrition-item .n-label {
      font-size: 11px;
      color: #999;
    }

    .nutrition-item .n-value {
      font-size: 17px;
      font-weight: bold;
      margin-top: 2px;
    }

    .nutrition-item .n-unit {
      font-size: 11px;
      font-weight: normal;
      color: #999;
    }

    .chart-area {
      height: 280px;
      position: relative;
      margin-bottom: 10px;
    }

    #registerBtn {
      margin-top: 10px;
    }

    /* =========================
       本日の食事ページ
    ========================= */
    .today-card {
      background: #f7f7f7;
      border-radius: 18px;
      padding: 16px;
      margin-top: 10px;
    }

    .today-card h3 {
      margin: 0 0 10px;
    }

    /* =========================
       下部ナビ
    ========================= */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 70px;
      padding-bottom: env(safe-area-inset-bottom);
      background: white;
      border-top: 1px solid #ddd;
      display: none;
      z-index: 1000;
    }

    .bottom-nav button {
      flex: 1;
      border: none;
      background: white;
      font-size: 13px;
      font-weight: bold;
      color: #999;
      border-right: 1px solid #eee;
      cursor: pointer;
    }

    .bottom-nav button:last-child {
      border-right: none;
    }

    .bottom-nav button.active-tab {
      color: #ff5722;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: center;

      background: #ff5722;

      margin: -16px -16px 16px -16px;
      padding: 16px;

      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: bold;
      color: white;
    }
  </style>
</head>

<body>


  <div class="container" id="appContainer">

    <div class="app-header">

      <h1>常翔ウェルフェア</h1>

    </div>
    <!-- 学食一覧画面 -->
    <div id="selectMenuPage" class="page" style="display:none;">

      <h2>学食メニュー一覧</h2>

      <div class="tab-bar" id="tabBar"></div>

      <div id="menuList"></div>

    </div>

    <!-- メニュー詳細画面 -->
    <div id="detailPage" style="display:none;">

      <div class="card">

        <button type="button" class="back-link" id="backToMenuBtn">← 一覧へ戻る</button>

        <div class="detail-hero" id="detailHero"></div>

        <h2 id="detailTitle"></h2>
        <div class="detail-category" id="detailCategory"></div>

        <div class="detail-meta">
          <span class="detail-price" id="detailPrice"></span>
          <span class="detail-tags" id="detailTags"></span>
        </div>

        <div class="nutrition-grid" id="nutritionGrid"></div>

        <div class="chart-area">
          <canvas id="radarChart"></canvas>
        </div>

        <button type="button" class="next-btn enabled" id="registerBtn">
          登録する
        </button>

      </div>

    </div>
    <!-- 本日の食事ページ -->
    <div id="todayPage" style="display:none;">

      <div class="card">

        <h2>本日の食事</h2>

        <div id="todayFood">
          まだ登録されていません
        </div>

      </div>

    </div>

    <!-- AIページ -->
    <div id="aiPage" style="display:none;">

      <div class="card">
        <h2>AIチャット</h2>
        <p>AIチャット画面</p>
      </div>

    </div>

    <!-- マイページ -->
    <div id="mypagePage" style="display:none;">

      <div class="card">
        <h2>マイページ</h2>
        <p>マイページ</p>
      </div>

    </div>
    <!-- 下部ナビ -->
    <div id="bottomNav" class="bottom-nav">

      <button type="button" id="todayTab">
        本日の食事
      </button>

      <button type="button" id="aiTab">
        AIチャット
      </button>

      <button type="button" id="menuTab">
        学食一覧
      </button>

      <button type="button" id="mypageTab">
        マイページ
      </button>



    </div>

    <!-- 進行バー -->
    <div class="progress-container">
      <div class="progress-step active"></div>
      <div class="progress-step"></div>
      <div class="progress-step"></div>
      <div class="progress-step"></div>
    </div>

    <!-- 入力画面 -->
    <div class="card" id="inputCard">

      <!-- 性別 (Step 0) -->
      <div class="question active">
        <label>性別を選択してください</label>
        <div class="gender-buttons">
          <button type="button" class="gender-btn" data-value="male">男性</button>
          <button type="button" class="gender-btn" data-value="female">女性</button>
        </div>
      </div>

      <!-- 年齢 (Step 1) -->
      <div class="question">
        <label>年齢を選択してください</label>
        <select id="age">
          <option value="">選択してください</option>
        </select>
      </div>

      <!-- 身長 (Step 2) -->
      <div class="question">
        <label>身長を選択してください</label>
        <select id="height">
          <option value="">選択してください</option>
        </select>
      </div>

      <!-- 体重 (Step 3) -->
      <div class="question">
        <label>体重を選択してください</label>
        <select id="weight">
          <option value="">選択してください</option>
        </select>
      </div>

      <!-- 次へボタン -->
      <div class="button-area">
        <button type="button" class="next-btn" id="nextBtn" disabled>次へ</button>
      </div>

    </div>

          { "id": "seasonal-01", "name": "冷やし担々麺", "category": "seasonal", "category_label": "季節限定", "tags": ["cold"], "price": 440, "energy_kcal": 555, "protein_g": 26.4, "fat_g": 22.7, "carb_g": 56.8, "salt_g": 6.7 },
          { "id": "seasonal-02", "name": "冷やしとり天", "category": "seasonal", "category_label": "季節限定", "tags": ["cold"], "price": 350, "energy_kcal": 505, "protein_g": 21.9, "fat_g": 22.7, "carb_g": 57.4, "salt_g": 2.9 },
          { "id": "seasonal-03", "name": "冷やしちく天", "category": "seasonal", "category_label": "季節限定", "tags": ["cold"], "price": 350, "energy_kcal": 419, "protein_g": 16.4, "fat_g": 11.8, "carb_g": 64.8, "salt_g": 3.9 },
          { "id": "seasonal-04", "name": "冷やしタルタルうどん", "category": "seasonal", "category_label": "季節限定", "tags": ["cold"], "price": 490, "energy_kcal": 658, "protein_g": 20.8, "fat_g": 39.2, "carb_g": 60.1, "salt_g": 2.8 },
          { "id": "seasonal-05", "name": "ごまだれ味噌うどん(冷やし)", "category": "seasonal", "category_label": "季節限定", "tags": ["cold"], "price": 490, "energy_kcal": 529, "protein_g": 22.6, "fat_g": 22.4, "carb_g": 62.3, "salt_g": 3.6 },
          { "id": "seasonal-06", "name": "サラダ麺", "category": "seasonal", "category_label": "季節限定", "tags": ["cold"], "price": 450, "energy_kcal": 606, "protein_g": 19.6, "fat_g": 18.9, "carb_g": 86.9, "salt_g": 4.3 },
          { "id": "seasonal-07", "name": "冷やし担々麺からあげセット", "category": "seasonal", "category_label": "季節限定", "tags": ["set", "cold"], "price": 710, "energy_kcal": 1059, "protein_g": 39.7, "fat_g": 35.7, "carb_g": 141.2, "salt_g": 7.7 }
        ]
      };

      const TAG_LABELS = {
        set: "セット",
        option: "オプション",
        ticket: "チケット",
        cold: "冷やし"
      };

      // レーダーチャート用の正規化（各項目を 0〜10 の範囲に変換）
      const RADAR_MAX = {
        energy_kcal: 1200,
        protein_g: 45,
        fat_g: 55,
        carb_g: 180,
        salt_g: 13
      };
      const RADAR_LABELS = ["エネルギー", "たんぱく質", "脂質", "炭水化物", "塩分"];

      function toRadarData(item) {
        return [
          item.energy_kcal / RADAR_MAX.energy_kcal * 10,
          item.protein_g / RADAR_MAX.protein_g * 10,
          item.fat_g / RADAR_MAX.fat_g * 10,
          item.carb_g / RADAR_MAX.carb_g * 10,
          item.salt_g / RADAR_MAX.salt_g * 10
        ].map(v => Math.round(Math.min(v, 10) * 10) / 10);
      }

      /* =========================================================
         保存データの読み書き
         （localStorage が使えない環境でもエラーにならないように
           簡易ストレージでラップ）
      ========================================================= */
      const storage = {
        memory: {},
        getItem(key) {
          try {
            return window.localStorage.getItem(key);
          } catch (e) {
            return key in this.memory ? this.memory[key] : null;
          }
        },
        setItem(key, value) {
          try {
            window.localStorage.setItem(key, value);
          } catch (e) {
            this.memory[key] = value;
          }
        }
      };

      /* =========================
         基本設定と要素の取得
      ========================= */
      let currentStep = 0;
      let selectedFood = null;
      let activeCategory = MENU_DATA.categories[0].id;
      let menuMode = "select"; // select=登録用 / browse=見るだけ用
      let radarChart = null;
      const questions = document.querySelectorAll(".question");
      const progressSteps = document.querySelectorAll(".progress-step");
      const nextBtn = document.getElementById("nextBtn");
      let selectedGender = null;

      /* =========================
         セレクトボックスの選択肢自動生成
      ========================= */
      const ageSelect = document.getElementById("age");
      {
        let options = "";
        for (let i = 18; i <= 30; i++) {
          options += `<option value="${i}">${i}歳</option>`;
        }
        ageSelect.insertAdjacentHTML("beforeend", options);
      }

      const heightSelect = document.getElementById("height");
      {
        let options = "";
        for (let i = 140; i <= 200; i++) {
          options += `<option value="${i}">${i}cm</option>`;
        }
        heightSelect.insertAdjacentHTML("beforeend", options);
      }

      const weightSelect = document.getElementById("weight");
      {
        let options = "";
        for (let i = 40; i <= 120; i++) {
          options += `<option value="${i}">${i}kg</option>`;
        }
        weightSelect.insertAdjacentHTML("beforeend", options);
      }

      /* =========================
         保存済みデータの読み込み・反映
      ========================= */
      const savedGender = storage.getItem("gender");
      const savedAge = storage.getItem("age");
      const savedHeight = storage.getItem("height");
      const savedWeight = storage.getItem("weight");

      if (savedGender) {
        selectedGender = savedGender;
        const savedGenderBtn = document.querySelector(`.gender-btn[data-value="${savedGender}"]`);
        if (savedGenderBtn) {
          savedGenderBtn.classList.add("selected");
        }
      }
      if (savedAge) { ageSelect.value = savedAge; }
      if (savedHeight) { heightSelect.value = savedHeight; }
      if (savedWeight) { weightSelect.value = savedWeight; }

      if (savedGender || savedAge || savedHeight || savedWeight) {
        enableButton();
      }

      /* =========================
         イベントリスナー（入力検知）
      ========================= */
      const genderButtons = document.querySelectorAll(".gender-btn");
      genderButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          genderButtons.forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          selectedGender = btn.dataset.value;
          enableButton();
        });
      });

      document.querySelectorAll("select").forEach(select => {
        select.addEventListener("change", () => {
          if (select.value !== "") {
            enableButton();
          } else {
            disableButton();
          }
        });
      });

      function enableButton() {
        nextBtn.classList.add("enabled");
        nextBtn.disabled = false;
      }

      function disableButton() {
        nextBtn.classList.remove("enabled");
        nextBtn.disabled = true;
      }

      /* =========================
         ステップ遷移・保存ロジック
      ========================= */
      nextBtn.addEventListener("click", () => {
        if (currentStep === 0 && !selectedGender) return;
        if (currentStep === 1 && ageSelect.value === "") return;
        if (currentStep === 2 && heightSelect.value === "") return;
        if (currentStep === 3 && weightSelect.value === "") return;

        if (currentStep === 3) {
          storage.setItem("gender", selectedGender);
          storage.setItem("age", ageSelect.value);
          storage.setItem("height", heightSelect.value);
          storage.setItem("weight", weightSelect.value);

          document.querySelector(".progress-container").style.display = "none";
          document.getElementById("inputCard").style.display = "none";
          document.getElementById("selectMenuPage").style.display = "block";
          return;
        }

        questions[currentStep].classList.remove("active");
        currentStep++;
        questions[currentStep].classList.add("active");
        progressSteps[currentStep].classList.add("active");

        disableButton();

        if (currentStep === 1 && ageSelect.value !== "") { enableButton(); }
        if (currentStep === 2 && heightSelect.value !== "") { enableButton(); }
        if (currentStep === 3 && weightSelect.value !== "") { enableButton(); }
      });

      /* =========================================================
         SmartNews風タブ + 学食一覧
      ========================================================= */
      const tabBar = document.getElementById("tabBar");
      const menuList = document.getElementById("menuList");

      function renderTabs() {
        tabBar.innerHTML = MENU_DATA.categories.map(cat => `
          <button type="button" class="tab-item${cat.id === activeCategory ? " active" : ""}" data-category="${cat.id}">
            ${cat.emoji} ${cat.label}
          </button>
        `).join("");

        tabBar.querySelectorAll(".tab-item").forEach(tab => {
          tab.addEventListener("click", () => {
            activeCategory = tab.dataset.category;
            renderTabs();
            renderMenuList();
            tab.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
          });
        });
      }

      function renderMenuList() {
        const items = MENU_DATA.items.filter(item => item.category === activeCategory);

        if (items.length === 0) {
          menuList.innerHTML = `<div class="empty-msg">このカテゴリのメニューはまだありません</div>`;
          return;
        }

        menuList.innerHTML = items.map(item => `
          <div class="menu-item" data-id="${item.id}">
            <div>
              <div class="menu-name">${item.name}</div>
              <div class="menu-tags">
                ${item.tags.map(t => `<span class="tag-badge">${TAG_LABELS[t] || t}</span>`).join("")}
              </div>
            </div>
            <div class="menu-meta">
              <span class="menu-price">¥${item.price}</span>
              <span class="menu-kcal">${item.energy_kcal}kcal</span>
            </div>
          </div>
        `).join("");

        menuList.querySelectorAll(".menu-item").forEach(card => {
          card.addEventListener("click", () => showDetail(card.dataset.id));
        });
      }

      renderTabs();
      renderMenuList();

      /* =========================================================
         メニュー詳細画面
      ========================================================= */
      const NUTRITION_FIELDS = [
        { key: "energy_kcal", label: "エネルギー", unit: "kcal" },
        { key: "protein_g", label: "たんぱく質", unit: "g" },
        { key: "fat_g", label: "脂質", unit: "g" },
        { key: "carb_g", label: "炭水化物", unit: "g" },
        { key: "salt_g", label: "食塩相当量", unit: "g" }
      ];

      function showDetail(itemId) {
        selectedFood = MENU_DATA.items.find(i => i.id === itemId);
        if (!selectedFood) return;

        if (menuMode === "select") {
          document.getElementById("registerBtn").style.display = "block";
        } else {
          document.getElementById("registerBtn").style.display = "none";
        }

        const category = MENU_DATA.categories.find(c => c.id === selectedFood.category);

        document.getElementById("selectMenuPage").style.display = "none";
        document.getElementById("detailPage").style.display = "block";

        document.getElementById("detailHero").textContent = category ? category.emoji : "🍽️";
        document.getElementById("detailTitle").textContent = selectedFood.name;
        document.getElementById("detailCategory").textContent = selectedFood.category_label;
        document.getElementById("detailPrice").textContent = `¥${selectedFood.price}`;

        document.getElementById("detailTags").innerHTML =
          selectedFood.tags.map(t => `<span class="tag-badge">${TAG_LABELS[t] || t}</span>`).join("");

        document.getElementById("nutritionGrid").innerHTML = NUTRITION_FIELDS.map(f => `
          <div class="nutrition-item">
            <div class="n-label">${f.label}</div>
            <div class="n-value">${selectedFood[f.key]}<span class="n-unit">${f.unit}</span></div>
          </div>
        `).join("");

        if (radarChart) {
          radarChart.destroy();
        }

        const ctx = document.getElementById("radarChart");

        radarChart = new Chart(ctx, {
          type: "radar",
          data: {
            labels: RADAR_LABELS,
            datasets: [{
              label: selectedFood.name,
              data: toRadarData(selectedFood),
              borderColor: "#ff5722",
              backgroundColor: "rgba(255,87,34,0.3)",
              borderWidth: 3
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              r: {
                min: 0,
                max: 10,
                ticks: {
                  stepSize: 2
                }
              }
            }
          }
        });
      }

      document.getElementById("backToMenuBtn").addEventListener("click", () => {
        document.getElementById("detailPage").style.display = "none";
        menuMode = "select";
        document.getElementById("selectMenuPage").style.display = "block";
      });

      document.getElementById("registerBtn")
        .addEventListener("click", () => {

          document.getElementById("detailPage").style.display = "none";

          document.getElementById("todayPage").style.display = "block";

          document.getElementById("appContainer").classList.add("has-bottom-nav");
          document.getElementById("bottomNav").style.display = "flex";

          document.getElementById("todayFood").innerHTML = `
            <div class="today-card">
              <h3>${selectedFood.name}</h3>
              <div class="nutrition-grid">
                ${NUTRITION_FIELDS.map(f => `
                  <div class="nutrition-item">
                    <div class="n-label">${f.label}</div>
                    <div class="n-value">${selectedFood[f.key]}<span class="n-unit">${f.unit}</span></div>
                  </div>
                `).join("")}
              </div>
            </div>
          `;

          setActiveTab(todayTab);
        });

      /* =========================
         下部タブ切り替え
      ========================= */
      const todayTab = document.getElementById("todayTab");
      const aiTab = document.getElementById("aiTab");
      const menuTab = document.getElementById("menuTab");
      const mypageTab = document.getElementById("mypageTab");

      const todayPage = document.getElementById("todayPage");
      const aiPage = document.getElementById("aiPage");
      const menuPage = document.getElementById("selectMenuPage");
      const mypagePage = document.getElementById("mypagePage");

      const allTabs = [todayTab, aiTab, menuTab, mypageTab];

      function setActiveTab(activeTab) {
        allTabs.forEach(tab => tab.classList.remove("active-tab"));
        activeTab.classList.add("active-tab");
      }

      function showPage(page, activeTab) {
        todayPage.style.display = "none";
        aiPage.style.display = "none";
        menuPage.style.display = "none";
        mypagePage.style.display = "none";
        document.getElementById("detailPage").style.display = "none";

        page.style.display = "block";
        setActiveTab(activeTab);
      }

      todayTab.onclick = () => showPage(todayPage, todayTab);
      aiTab.onclick = () => showPage(aiPage, aiTab);
      menuTab.onclick = () => {
        menuMode = "browse";
        showPage(menuPage, menuTab);
      };
      mypageTab.onclick = () => showPage(mypagePage, mypageTab);
    </script>
