<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>限界大学生の学食ナビ（仮）</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background-color: #f5f5f5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 18px;
      background-color: #ff5722;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>基本情報の入力</h2>

  <form id="profileForm">
    <div class="form-group">
      <label for="gender">性別</label>
      <select id="gender" required>
        <option value="">選択してください</option>
        <option value="male">男性</option>
        <option value="female">女性</option>
      </select>
    </div>

    <div class="form-group">
      <label for="age">年齢</label>
      <input type="number" id="age" placeholder="例: 20" min="18" max="30" required>
    </div>

    <div class="form-group">
      <label for="height">身長 (cm)</label>
      <input type="number" id="height" placeholder="例: 170.5" step="0.1" required>
    </div>

    <div class="form-group">
      <label for="weight">体重 (kg)</label>
      <input type="number" id="weight" placeholder="例: 60.0" step="0.1" required>
    </div>

    <button type="submit">次へ（ガチャを回す）</button>
  </form>

  <script>
    // ここに「ボタンが押されたらデータを保存する」JavaScriptを書く
  </script>
</body>

</html>
