<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>限界大学生の学食ナビ - 基本情報入力</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f5f5f5;
      font-family: sans-serif;
      overflow-y: auto;
    }

    .container {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 16px;
      position: relative;
      transition: padding-bottom 0.2s;
    }

    .container.has-bottom-nav {
      padding-bottom: calc(120px + env(safe-area-inset-bottom));
    }

    #detailPage {
      padding-bottom: 110px;
    }

    /* =========================
       進行バー
    ========================= */
    .progress-container {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .progress-step {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: #ddd;
      transition: 0.3s;
    }

    .progress-step.active {
      background: #ff5722;
    }

    /* =========================
       入力画面カード
       ※メニュー一覧・本日の食事などは全画面表示にするため、
         白いカードUIは基本情報入力だけに使う
    ========================= */
    #inputCard {
      background: white;
      border-radius: 28px;
      padding: 30px 24px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
      height: calc(100vh - 105px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }


    .page {
      min-height: calc(100vh - 32px);
      padding: 0;
    }

    #selectMenuPage {
      padding-bottom: 90px;
    }

    /* 一覧・詳細・タブ系ページは中央寄せせず上から表示 */
    #selectMenuPage .card,
    #detailPage .card,
    #todayPage .card,
    #aiPage .card,
    #mypagePage .card {
      height: auto;
      min-height: calc(100vh - 40px);
      justify-content: flex-start;
    }

    .question {
      display: none;
    }

    .question.active {
      display: block;
    }

    label {
      display: block;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 40px;
    }

    /* =========================
       性別ボタン
    ========================= */
    .gender-buttons {
      display: flex;
      gap: 16px;
    }

    .gender-btn {
      flex: 1;
      border: none;
      border-radius: 20px;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      background: #e5e5e5;
      transition: 0.2s;
      cursor: pointer;
    }

    .gender-btn:hover {
      background: #d8d8d8;
    }

    .gender-btn.selected {
      background: #ff5722;
      color: white;
    }

    /* =========================
       select
    ========================= */
    select {
      width: 100%;
      padding: 20px;
      border-radius: 20px;
      border: 1px solid #ddd;
      font-size: 22px;
      background: white;
    }

    input[type="text"] {
      width: 100%;
      padding: 20px;
      border-radius: 20px;
      border: 1px solid #ddd;
      font-size: 22px;
      background: white;
    }

    /* =========================
       次へボタン / 共通ボタン
    ========================= */
    .button-area {
      margin-top: 40px;
    }

    .next-btn {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border: none;
      border-radius: 20px;
      background: #e0e0e0;
      color: #999;
      cursor: not-allowed;
      transition: 0.2s;
    }

    .next-btn.enabled {
      background: #ff5722;
      color: white;
      cursor: pointer;
    }

    /* =========================
       スマホ最適化
    ========================= */
    @media (max-height: 750px) {
      label {
        font-size: 24px;
        margin-bottom: 28px;
      }
    }

    /* =========================
       学食一覧ページ見出し
    ========================= */
    #selectMenuPage h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    /* =========================
       SmartNews風 横スクロールタブ
    ========================= */
    .tab-bar {
      display: flex;
      gap: 4px;
      overflow-x: scroll;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;

      width: calc(100% + 32px);
      max-width: none;

      margin: 0 -16px 16px;
      padding: 0 16px;

      border-bottom: 1px solid #eee;
      scrollbar-width: none;
    }

    .tab-bar::-webkit-scrollbar {
      display: none;
    }

    .tab-item {
      flex: 0 0 auto;
      appearance: none;
      border: none;
      background: none;
      padding: 10px 14px 12px;
      font-size: 15px;
      font-weight: bold;
      color: #aaa;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      transition: 0.2s;
    }

    .tab-item:hover {
      color: #ff5722;
    }

    .tab-item.active {
      color: #ff5722;
      border-bottom-color: #ff5722;
    }

    /* =========================
       学食一覧（メニューカード）
    ========================= */
    #menuList {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-content: start;
    }

    .menu-item {
      background: #f7f7f7;
      border: 1px solid #ddd;
      border-radius: 18px;
      min-height: 112px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: left;
      cursor: pointer;
      transition: 0.2s;
    }

    .menu-item:hover {
      background: #fff5f2;
      border-color: #ff5722;
    }

    .menu-item.selected-menu {
      background: #e9e9e9;
      border-color: #d0d0d0;
      opacity: 0.85;
      cursor: default;
    }

    .selected-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 3px 7px;
      border-radius: 999px;
      background: #9e9e9e;
      color: white;
      font-size: 10px;
      font-weight: bold;
    }

    .selected-status {
      margin-top: 6px;
    }


    .selected-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .remove-selected-btn {
      border: none;
      border-radius: 999px;
      background: #eeeeee;
      color: #555;
      font-size: 10px;
      font-weight: bold;
      padding: 4px 8px;
      cursor: pointer;
    }

    .cancel-large-btn {
      border: none;
      border-radius: 999px;
      background: #fff3e0;
      color: #ff5722;
      font-size: 10px;
      font-weight: bold;
      padding: 4px 8px;
      cursor: pointer;
    }

    .add-large-btn {
      border: none;
      border-radius: 999px;
      background: #e3f2fd;
      color: #1e88e5;
      font-size: 10px;
      font-weight: bold;
      padding: 4px 8px;
      cursor: pointer;
    }

    .confirm-food-item {
      margin-bottom: 8px;
    }

    .confirm-food-name {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .confirm-food-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .modal-cancel-large-btn,
    .remove-food-btn {
      border: none;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      padding: 5px 9px;
      cursor: pointer;
    }

    .modal-cancel-large-btn {
      background: #fff3e0;
      color: #ff5722;
    }

    .modal-add-large-btn {
      background: #e3f2fd;
      color: #1e88e5;
    }

    .remove-food-btn {
      background: #eeeeee;
      color: #555;
    }

    .menu-item.selected-menu:hover {
      background: #e9e9e9;
      border-color: #d0d0d0;
    }

    .menu-item .menu-name {
      font-size: 15px;
      font-weight: bold;
      line-height: 1.35;
    }

    .menu-item .menu-tags {
      margin-top: 6px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .tag-badge {
      font-size: 10px;
      font-weight: bold;
      color: #ff5722;
      background: #ffe3da;
      border-radius: 6px;
      padding: 2px 6px;
      white-space: nowrap;
    }

    .menu-item .menu-meta {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .menu-item .menu-price {
      font-size: 17px;
      font-weight: bold;
      color: #ff5722;
    }

    .menu-item .menu-kcal {
      font-size: 11px;
      color: #999;
    }

    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      color: #999;
      font-size: 14px;
      padding: 30px 0;
    }

    /* =========================
       メニュー詳細ページ
    ========================= */
    .back-link {
      background: none;
      border: none;
      color: #ff5722;
      font-weight: bold;
      font-size: 15px;
      margin-bottom: 12px;
      cursor: pointer;
      padding: 6px 0;
    }

    .detail-hero {
      width: 100%;
      height: 160px;
      border-radius: 20px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      background: linear-gradient(135deg, #ffe3da, #ffb199);
    }

    #detailTitle {
      font-size: 24px;
      margin: 0 0 4px;
    }

    .detail-category {
      font-size: 13px;
      color: #999;
      margin-bottom: 12px;
    }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .detail-price {
      font-size: 26px;
      font-weight: bold;
      color: #ff5722;
    }

    .detail-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .advice-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #fff8e1;
    }

    .advice-box h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .advice-box ul {
      margin: 0;
      padding-left: 18px;
    }

    .advice-box li {
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .nutrition-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .nutrition-item:last-child {
      grid-column: 1 / -1;
    }

    .nutrition-item {
      background: #f7f7f7;
      border-radius: 14px;
      padding: 10px 6px;
      text-align: center;
    }

    .nutrition-item .n-label {
      font-size: 11px;
      color: #999;
    }

    .nutrition-item .n-value {
      font-size: 17px;
      font-weight: bold;
      margin-top: 2px;
    }

    .nutrition-item .n-unit {
      font-size: 11px;
      font-weight: normal;
      color: #999;
    }

    .nutrition-top {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .diff-plus {
      color: #e53935;
      font-size: 13px;
      font-weight: bold;
    }

    .diff-minus {
      color: #1e88e5;
      font-size: 13px;
      font-weight: bold;
    }

    .n-standard {
      display: block;
      margin-top: 2px;
      font-size: 10px;
      color: #9bbfd4;
      font-weight: normal;
    }

    .chart-area {
      height: 280px;
      position: relative;
      margin-bottom: 10px;
    }

    #todayPage .chart-area {
      height: 280px;
      width: 100%;
      position: relative;
    }

    #todayRadarChart {
      width: 100% !important;
      height: 100% !important;
    }

    #registerBtn {
      margin-top: 10px;
    }

    .option-area {
      margin: 10px 0;
      background: #f7f7f7;
      border-radius: 14px;
      padding: 12px;
    }

    .option-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 15px;
      font-weight: bold;
    }

    .option-check input {
      width: 18px;
      height: 18px;
    }

    #largeOptionText {
      color: #999;
      font-size: 12px;
      font-weight: normal;
    }

    /* =========================
       本日の食事ページ
    ========================= */
    .today-card {
      background: #f7f7f7;
      border-radius: 18px;
      padding: 16px;
      margin-top: 10px;
    }

    .today-card h3 {
      margin: 0 0 10px;
    }

    .today-menu-list {
      margin: 0 0 14px;
      padding-left: 20px;
      font-size: 14px;
      line-height: 1.7;
    }

    .today-food-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .today-remove-btn {
      border: none;
      border-radius: 999px;
      background: #eeeeee;
      color: #555;
      font-size: 11px;
      font-weight: bold;
      padding: 4px 8px;
    }


    .today-food-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .today-add-large-btn {
      border: none;
      border-radius: 999px;
      background: #e3f2fd;
      color: #1e88e5;
      font-size: 10px;
      font-weight: bold;
      padding: 4px 8px;
    }

    .today-cancel-large-btn {
      border: none;
      border-radius: 999px;
      background: #fff3e0;
      color: #ff5722;
      font-size: 10px;
      font-weight: bold;
      padding: 4px 8px;
    }

    /* =========================
   マイページ
========================= */
    .profile-card {
      background: #f7f7f7;
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 16px;
    }

    .history-date-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
      background: white;
      font-weight: bold;
    }

    .history-detail-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }

    .history-detail-card h3 {
      margin-bottom: 12px;
    }

    .calendar-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      text-align: center;
    }

    .calendar-day {
      min-height: 50px;
      border: none;
      border-radius: 10px;
      background: #f5f5f5;
      font-size: 12px;
    }

    .calendar-day.has-meal {
      background: #ffe0b2;
      color: #e65100;
      font-weight: bold;
    }

    .calendar-day:disabled {
      color: #ccc;
      cursor: default;
    }

    .calendar-day.today {
      border: 2px solid #ff5722;
      box-shadow: 0 0 0 2px rgba(255, 87, 34, .2);
    }

    .calendar-day.has-meal:hover {
      transform: scale(1.05);
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .calendar-header h3 {
      margin: 0;
    }

    .calendar-header button {
      border: none;
      background: #ff5722;
      color: white;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      font-size: 20px;
      font-weight: bold;
    }

    .edit-profile-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      background: #ff5722;
      color: white;
      font-weight: bold;
      padding: 12px;
      margin-top: 10px;
    }

    /* =========================
       下部ナビ
    ========================= */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 70px;
      padding-bottom: env(safe-area-inset-bottom);
      background: white;
      border-top: 1px solid #ddd;
      display: none;
      z-index: 1000;
    }

    .selected-bar {
      position: fixed;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 398px;
      background: white;
      border-radius: 18px;
      padding: 12px 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 900;
    }

    .selected-bar button {
      border: none;
      background: #ff5722;
      color: white;
      font-weight: bold;
      border-radius: 14px;
      padding: 10px 14px;
    }

    .bottom-nav button {
      flex: 1;
      border: none;
      background: white;
      font-size: 13px;
      font-weight: bold;
      color: #999;
      border-right: 1px solid #eee;
      cursor: pointer;
    }

    .bottom-nav button:last-child {
      border-right: none;
    }

    .bottom-nav button.active-tab {
      color: #ff5722;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 16px;
    }

    .modal-box {
      width: 100%;
      max-width: 398px;
      max-height: 85vh;
      overflow-y: auto;
      background: white;
      border-radius: 22px;
      padding: 18px;
    }

    .modal-box h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .modal-buttons button {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 12px;
      font-weight: bold;
    }

    .modal-chart-area {
      height: 240px;
      position: relative;
      margin-top: 12px;
    }

    #reselectBtn {
      background: #e0e0e0;
      color: #555;
    }

    #confirmRegisterBtn {
      background: #ff5722;
      color: white;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: center;

      background: #ff5722;

      margin: -16px -16px 16px -16px;
      padding: 16px;

      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: bold;
      color: white;
    }
  </style>
</head>

<body>


  <div class="container" id="appContainer">

    <div class="app-header">

      <h1>常翔ウェルフェア</h1>

    </div>
    <!-- 学食一覧画面 -->
    <div id="selectMenuPage" class="page" style="display:none;">

      <h2>学食メニュー一覧</h2>

      <div class="tab-bar" id="tabBar"></div>

      <div id="menuList"></div>

      <div id="selectedBar" class="selected-bar" style="display:none;">
        <span id="selectedCount">選択中 0品</span>
        <button type="button" id="finishSelectBtn">まとめて登録</button>
      </div>

    </div>

    <!-- メニュー詳細画面 -->
    <div id="detailPage" style="display:none;">

      <div class="card">

        <button type="button" class="back-link" id="backToMenuBtn">← 一覧へ戻る</button>

        <div class="detail-hero" id="detailHero"></div>

        <h2 id="detailTitle"></h2>
        <div class="detail-category" id="detailCategory"></div>

        <div class="detail-meta">
          <span class="detail-price" id="detailPrice"></span>
          <span class="detail-tags" id="detailTags"></span>
        </div>

        <div class="nutrition-grid" id="nutritionGrid"></div>

        <div class="chart-area">
          <canvas id="radarChart"></canvas>
        </div>

        <div id="largeOptionArea" class="option-area" style="display:none;">
          <label class="option-check">
            <input type="checkbox" id="largeOptionCheck">
            大盛りにする
            <span id="largeOptionText"></span>
          </label>
        </div>

        <button type="button" class="next-btn enabled" id="registerBtn">
          選択リストに追加
        </button>

        <button type="button" class="back-link" id="backToMenuBtnBottom">
          ← 一覧へ戻る
        </button>

      </div>

    </div>
    <!-- 本日の食事ページ -->
    <div id="todayPage" style="display:none;">

      <div class="card">

        <h2>本日の食事</h2>

        <div id="todayFood">
          まだ登録されていません
        </div>

      </div>

    </div>

    <!-- AIページ -->
    <div id="aiPage" style="display:none;">

      <div class="card">
        <h2>AIチャット</h2>
        <p>AIチャット画面</p>
      </div>

    </div>

    <!-- マイページ -->
    <div id="mypagePage" style="display:none;">

      <div class="card">

        <h2>マイページ</h2>

        <div id="profileCard"></div>

        <div id="calendarArea"></div>

        <div id="historyDetail"></div>
      </div>

    </div>
    <!-- 下部ナビ -->
    <div id="bottomNav" class="bottom-nav">

      <button type="button" id="todayTab">
        本日の食事
      </button>

      <button type="button" id="aiTab">
        AIチャット
      </button>

      <button type="button" id="menuTab">
        メニュー選択
      </button>

      <button type="button" id="mypageTab">
        マイページ
      </button>



    </div>

    <div id="confirmModal" class="modal-overlay" style="display:none;">
      <div class="modal-box">

        <h2>本日の合計栄養バランス</h2>

        <div id="confirmModalContent"></div>

        <div class="modal-chart-area">
          <canvas id="confirmRadarChart"></canvas>
        </div>

        <div class="modal-buttons">
          <button type="button" id="reselectBtn">戻る</button>

      const RADAR_MAX = {
        energy_kcal: 1200,
        protein_g: 45,
        fat_g: 55,
        carb_g: 180,
        salt_g: 13
      };
      const RADAR_LABELS = ["エネルギー", "たんぱく質", "脂質", "炭水化物", "塩分"];

      function getBasalRate(gender, age) {
        if (gender === "male") {
          if (age < 30) return 23.7;
          if (age < 50) return 22.5;
          if (age < 65) return 21.8;
          if (age < 75) return 21.6;
          return 21.5;
        } else {
          if (age < 30) return 22.1;
          if (age < 50) return 21.9;
          if (age < 65) return 20.7;
          if (age < 75) return 20.7;
          return 20.7;
        }
      }

      function getActivityLevel(age) {
        if (age < 65) return 1.75;
        return 1.70;
      }

      function getIdealNutrition() {
        const gender = storage.getItem("gender") || "male";
        const age = Number(storage.getItem("age")) || 20;
        const height = Number(storage.getItem("height")) || 170;
        const weight = Number(storage.getItem("weight")) || 60;

        const heightM = height / 100;
        const bmi = weight / (heightM * heightM);

        const basalRate = getBasalRate(gender, age);
        let activityLevel = getActivityLevel(age);

        if (bmi >= 25) {
          activityLevel -= 0.1;
        } else if (bmi < 18.5) {
          activityLevel += 0.1;
        }

        const dailyEnergy = weight * basalRate * activityLevel;
        const mealEnergy = dailyEnergy / 3;

        return {
          energy_kcal: mealEnergy,
          protein_g: mealEnergy * 0.165 / 4,
          fat_g: mealEnergy * 0.25 / 9,
          carb_g: mealEnergy * 0.575 / 4,
          salt_g: gender === "male" ? 2.5 : 2.2
        };
      }
      function toRadarData(item) {
        return [
          item.energy_kcal / RADAR_MAX.energy_kcal * 10,
          item.protein_g / RADAR_MAX.protein_g * 10,
          item.fat_g / RADAR_MAX.fat_g * 10,
          item.carb_g / RADAR_MAX.carb_g * 10,
          item.salt_g / RADAR_MAX.salt_g * 10
        ].map(v => Math.round(Math.min(v, 10) * 10) / 10);
      }

      function idealRadarData() {
        return [5, 5, 5, 5, 5];
      }

      function getDiffLabel(item, field) {
        const ideal = getIdealNutrition();
        const diff = item[field.key] - ideal[field.key];

        const rounded = Math.round(diff * 10) / 10;
        const sign = rounded >= 0 ? "+" : "";

        return `${field.label} (${sign}${rounded}${field.unit})`;
      }

          fatG: registeredTotalFood.fat_g,
          carbG: registeredTotalFood.carb_g,
          saltG: registeredTotalFood.salt_g
        };

        fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });
      }

        } else {

        });
      });

          }
        });
      });

      function enableButton() {
        nextBtn.classList.add("enabled");
        nextBtn.disabled = false;
      }

        nextBtn.classList.remove("enabled");
        nextBtn.disabled = true;
      }

      ========================= */
      nextBtn.addEventListener("click", () => {

        if (currentStep === 0 && studentIdInput.value.trim() === "") return;
        if (currentStep === 1 && !selectedGender) return;
        if (currentStep === 2 && ageSelect.value === "") return;
        if (currentStep === 3 && heightSelect.value === "") return;
        if (currentStep === 4 && weightSelect.value === "") return;

        if (currentStep === 4) {
          storage.setItem("studentId", studentIdInput.value.trim());
          storage.setItem("gender", selectedGender);
          storage.setItem("age", ageSelect.value);
          storage.setItem("height", heightSelect.value);
          storage.setItem("weight", weightSelect.value);

          menuMode = "select";

          renderMenuList();
          updateSelectedBar();

          document.getElementById("bottomNav").style.display = "flex";

        currentStep++;
        questions[currentStep].classList.add("active");
        progressSteps[currentStep].classList.add("active");

        if (currentStep === 1 && selectedGender) { enableButton(); }
        if (currentStep === 2 && ageSelect.value !== "") { enableButton(); }
        if (currentStep === 3 && heightSelect.value !== "") { enableButton(); }
        if (currentStep === 4 && weightSelect.value !== "") { enableButton(); }

      /* =========================================================
         SmartNews風タブ + 学食一覧

      function renderTabs() {

      function renderMenuList() {

${isSelected && menuMode === "select" ? `

${selectedFoods.find(f => f.baseId === item.id && f.isLarge) ? `

        return {
          name: selectedFoods.map(f => f.name).join(" + "),

          energy_kcal: selectedFoods.reduce((sum, f) => sum + f.energy_kcal, 0),
          protein_g: selectedFoods.reduce((sum, f) => sum + f.protein_g, 0),
          fat_g: selectedFoods.reduce((sum, f) => sum + f.fat_g, 0),

          price: foodList.reduce((sum, f) => sum + f.price, 0),
          energy_kcal: foodList.reduce((sum, f) => sum + f.energy_kcal, 0),
          protein_g: foodList.reduce((sum, f) => sum + f.protein_g, 0),
          fat_g: foodList.reduce((sum, f) => sum + f.fat_g, 0),
          carb_g: foodList.reduce((sum, f) => sum + f.carb_g, 0),
          salt_g: foodList.reduce((sum, f) => sum + f.salt_g, 0)
        };

      function getNutritionAdvice(totalFood, ideal) {
        const advice = [];

        if (totalFood.energy_kcal > ideal.energy_kcal + 100) {
          advice.push("エネルギーが基準より多めです。");
        }

        if (totalFood.energy_kcal < ideal.energy_kcal - 100) {
          advice.push("エネルギーが基準より少なめです。");
        }

        if (totalFood.protein_g < ideal.protein_g * 0.8) {
          advice.push("たんぱく質が不足しています。");
        }

        if (totalFood.fat_g > ideal.fat_g * 1.2) {
          advice.push("脂質を摂りすぎています。");
        }

        if (totalFood.salt_g > ideal.salt_g * 1.2) {
          advice.push("食塩相当量が高めです。");
        }

        if (totalFood.carb_g > ideal.carb_g * 1.2) {
          advice.push("炭水化物が多めです。");
        }

        if (advice.length === 0) {
          advice.push("全体的に基準に近い食事です。");
        }

        return advice;
      }

      function loadTodayMealFromHistory() {
        const todayKey = new Date().toISOString().slice(0, 10);
        const mealHistory = JSON.parse(storage.getItem("mealHistory") || "{}");

        if (!mealHistory[todayKey]) return;

        registeredFoods = mealHistory[todayKey].foods || [];
        registeredTotalFood = mealHistory[todayKey].total || null;
      }
      function saveTodayMealToHistory() {
        const todayKey = new Date().toISOString().slice(0, 10);
        const mealHistory = JSON.parse(storage.getItem("mealHistory") || "{}");

        if (registeredFoods.length === 0) {
          delete mealHistory[todayKey];
        } else {
          mealHistory[todayKey] = {
            date: todayKey,
            foods: registeredFoods,
            total: registeredTotalFood
          };
        }

        storage.setItem("mealHistory", JSON.stringify(mealHistory));
      }

  合計金額：¥${totalFood.price}
</p>

<ul class="today-menu-list">
  ${registeredFoods.map((f, index) => {
          const baseId = f.baseId || f.id;
          const baseFood = MENU_DATA.items.find(item => item.id === baseId);
          const canLargeMenu = baseFood && ["udon", "ramen", "curry"].includes(baseFood.category);

          return `
      <li class="today-food-item">
        <span>${f.name}</span>

        <div class="today-food-actions">
          ${canLargeMenu ? (
              f.isLarge ? `
              <button type="button" class="today-cancel-large-btn" data-index="${index}">
                大盛り解除
              </button>
            ` : `
              <button type="button" class="today-add-large-btn" data-index="${index}">
                大盛り追加
              </button>
            `
            ) : ""}

          <button type="button" class="today-remove-btn" data-index="${index}">
            削除
          </button>
        </div>
      </li>
    `;
        }).join("")}
</ul>

            <div class="chart-area">
              <canvas id="todayRadarChart"></canvas>
            </div>

            <div class="nutrition-grid">
              ${NUTRITION_FIELDS.map(f => {
          const diff = totalFood[f.key] - ideal[f.key];
          const diffClass = diff >= 0 ? "diff-plus" : "diff-minus";
          const diffText = diff >= 0
            ? `↑+${diff.toFixed(1)}${f.unit}`
            : `↓${Math.abs(diff).toFixed(1)}${f.unit}`;

          return `
                  <div class="nutrition-item">
                    <div class="n-label">${f.label}</div>

                    <div class="nutrition-top">
                      <div class="n-value">
                        ${totalFood[f.key].toFixed(1)}
                        <span class="n-unit">${f.unit}</span>
                      </div>

                      <div class="${diffClass}">
                        ${diffText}
                      </div>
                    </div>

                    <div class="n-standard">
                      基準 ${ideal[f.key].toFixed(1)}${f.unit}
                    </div>
                  </div>
                `;
        }).join("")}
            </div>
            <div class="advice-box">
  <h3>📊 栄養コメント</h3>

  <ul>
    ${advice.map(a => `<li>${a}</li>`).join("")}
  </ul>
</div>
          </div>
        `;

        if (todayRadarChart) {
          todayRadarChart.destroy();
          todayRadarChart = null;
        }

        requestAnimationFrame(() => {
          const todayCtx = document.getElementById("todayRadarChart");
          if (!todayCtx || typeof Chart === "undefined") return;

          todayRadarChart = new Chart(todayCtx, {
            type: "radar",
            data: {
              labels: RADAR_LABELS,
              datasets: [
                {
                  label: "理想",
                  data: idealRadarData(),
                  backgroundColor: "rgba(66,165,245,0.55)",
                  borderWidth: 0,
                  pointRadius: 0,
                  pointHoverRadius: 0
                },
                {
                  label: "本日の合計",
                  data: toRadarData(totalFood),
                  borderColor: "#ff5722",
                  backgroundColor: "rgba(255,87,34,0.3)",
                  borderWidth: 3
                }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              scales: {
                r: {
                  min: 0,
                  max: 10,
                  ticks: {
                    stepSize: 2
                  }
                }
              }
            }
          });

          todayRadarChart.resize();
        });

        document.querySelectorAll(".today-remove-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const index = Number(btn.dataset.index);

            registeredFoods.splice(index, 1);

            if (registeredFoods.length === 0) {
              registeredTotalFood = null;
              saveTodayMealToHistory();
              renderTodayPage();
              return;
            }

            registeredTotalFood = calcTotalFood(registeredFoods);

            saveTodayMealToHistory();

            renderTodayPage();
          });
        });
        document.querySelectorAll(".today-add-large-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const index = Number(btn.dataset.index);
            const food = registeredFoods[index];

            if (!food) return;

            const baseId = food.baseId || food.id;
            const baseFood = MENU_DATA.items.find(item => item.id === baseId);
            if (!baseFood) return;

            const largeOption = MENU_DATA.items.find(item =>
              item.category === baseFood.category &&
              item.tags.includes("option")
            );

            if (!largeOption) return;

            registeredFoods[index] = {
              ...baseFood,
              baseId: baseFood.id,
              isLarge: true,
              name: `${baseFood.name} 大盛り`,
              price: baseFood.price + largeOption.price,
              energy_kcal: baseFood.energy_kcal + largeOption.energy_kcal,
              protein_g: baseFood.protein_g + largeOption.protein_g,
              fat_g: baseFood.fat_g + largeOption.fat_g,
              carb_g: baseFood.carb_g + largeOption.carb_g,
              salt_g: baseFood.salt_g + largeOption.salt_g
            };

            registeredTotalFood = calcTotalFood(registeredFoods);
            saveTodayMealToHistory();
            renderTodayPage();
          });
        });

        document.querySelectorAll(".today-cancel-large-btn").forEach(btn => {
          btn.addEventListener("click", () => {
            const index = Number(btn.dataset.index);
            const food = registeredFoods[index];

            if (!food) return;

            const baseId = food.baseId || food.id;
            const baseFood = MENU_DATA.items.find(item => item.id === baseId);
            if (!baseFood) return;

            registeredFoods[index] = {
              ...baseFood,
              baseId: baseFood.id,
              isLarge: false
            };

            registeredTotalFood = calcTotalFood(registeredFoods);
            saveTodayMealToHistory();
            renderTodayPage();
          });
        });
      }

      function renderMyPage() {
        const studentId = storage.getItem("studentId");
        const gender = storage.getItem("gender");
        const age = storage.getItem("age");
        const height = storage.getItem("height");
        const weight = storage.getItem("weight");

        document.getElementById("profileCard").innerHTML = `
    <div class="profile-card">

      <h3>基本情報</h3>
      <p>学籍番号：${storage.getItem("studentId") || "未登録"}</p>
      <p>性別：${gender === "male" ? "男性" : "女性"}</p>
      <p>年齢：${age}歳</p>
      <p>身長：${height}cm</p>
      <p>体重：${weight}kg</p>
<button type="button" id="editProfileBtn" class="edit-profile-btn">
  基本情報を変更
</button>
    </div>
  `;


        renderCalendar();
        document.getElementById("editProfileBtn").onclick = () => {
          document.getElementById("mypagePage").style.display = "none";
          document.querySelector(".progress-container").style.display = "flex";
          document.getElementById("inputCard").style.display = "flex";
          document.getElementById("bottomNav").style.display = "none";
          document.getElementById("appContainer").classList.remove("has-bottom-nav");

          currentStep = 0;

          questions.forEach(q => q.classList.remove("active"));
          questions[0].classList.add("active");

          progressSteps.forEach((step, index) => {
            step.classList.toggle("active", index === 0);
          });

          window.scrollTo({ top: 0, behavior: "auto" });
        };
      }

      function renderCalendar() {

        const mealHistory =
          JSON.parse(storage.getItem("mealHistory") || "{}");

        const year = calendarYear;
        const month = calendarMonth;

        const firstDay = new Date(year, month, 1).getDay();

        const lastDate = new Date(year, month + 1, 0).getDate();

        let html = `
    <div class="calendar-card">

<div class="calendar-header">
  <button type="button" id="prevMonthBtn">‹</button>
  <h3>${year}年${month + 1}月</h3>
  <button type="button" id="nextMonthBtn">›</button>
</div>

      <div class="calendar-grid">

        <div>日</div>
        <div>月</div>
        <div>火</div>
        <div>水</div>
        <div>木</div>
        <div>金</div>
        <div>土</div>
  `;

        for (let i = 0; i < firstDay; i++) {
          html += `<div></div>`;
        }

        for (let day = 1; day <= lastDate; day++) {

          const dateKey =
            `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

          const hasMeal = mealHistory[dateKey];

          const todayKey = new Date().toISOString().slice(0, 10);
          const isToday = dateKey === todayKey;

          html += `
<button
  class="calendar-day ${hasMeal ? "has-meal" : ""}"
  data-date="${dateKey}"
  ${hasMeal ? "" : "disabled"}
>
        ${day}

        ${hasMeal ? "<div>🍽</div>" : ""}
      </button>
    `;
        }

        html += `
      </div>
    </div>
  `;

        document.getElementById("calendarArea").innerHTML = html;

        document.querySelectorAll(".calendar-day").forEach(btn => {
          btn.addEventListener("click", () => {
            showHistoryDetail(btn.dataset.date);
          });
        });

        document.getElementById("prevMonthBtn").onclick = () => {
          calendarMonth--;

          if (calendarMonth < 0) {
            calendarMonth = 11;
            calendarYear--;
          }

          renderCalendar();
        };

        document.getElementById("nextMonthBtn").onclick = () => {
          calendarMonth++;

          if (calendarMonth > 11) {
            calendarMonth = 0;
            calendarYear++;
          }

          renderCalendar();
        };
      }

      function showHistoryDetail(date) {

        const mealHistory =
          JSON.parse(storage.getItem("mealHistory") || "{}");

        const data = mealHistory[date];

        if (!data) return;

        const ideal = getIdealNutrition();
        const advice = getNutritionAdvice(data.total, ideal);



        document.getElementById("historyDetail").innerHTML = `
    <div class="history-detail-card">

      <h3>${date} の食事記録</h3>

      <ul>
        ${data.foods.map(f =>
          `<li>${f.name}</li>`
        ).join("")}
      </ul>

      <hr>

      <p>エネルギー：${data.total.energy_kcal.toFixed(1)}kcal</p>
      <p>たんぱく質：${data.total.protein_g.toFixed(1)}g</p>
      <p>脂質：${data.total.fat_g.toFixed(1)}g</p>
      <p>炭水化物：${data.total.carb_g.toFixed(1)}g</p>
      <p>食塩相当量：${data.total.salt_g.toFixed(1)}g</p>
<div class="advice-box">
  <h3>📊 栄養コメント</h3>

  <ul>
    ${advice.map(a => `<li>${a}</li>`).join("")}
  </ul>
</div>
    </div>
  `;
      }

      document.getElementById("reselectBtn")
        .addEventListener("click", () => {
          document.getElementById("confirmModal").style.display = "none";
        });

      document.getElementById("confirmRegisterBtn")
        .addEventListener("click", () => {

          registeredFoods = [
            ...registeredFoods,
            ...selectedFoods
          ];

          registeredTotalFood = {
            name: registeredFoods.map(f => f.name).join(" + "),
            price: registeredFoods.reduce((sum, f) => sum + f.price, 0),
            energy_kcal: registeredFoods.reduce((sum, f) => sum + f.energy_kcal, 0),
            protein_g: registeredFoods.reduce((sum, f) => sum + f.protein_g, 0),
            fat_g: registeredFoods.reduce((sum, f) => sum + f.fat_g, 0),
            carb_g: registeredFoods.reduce((sum, f) => sum + f.carb_g, 0),
            salt_g: registeredFoods.reduce((sum, f) => sum + f.salt_g, 0)
          };

          selectedFood = registeredTotalFood;
          sendMealDataToSheet();
          const todayKey = new Date().toISOString().slice(0, 10);

          const mealHistory = JSON.parse(storage.getItem("mealHistory") || "{}");

          mealHistory[todayKey] = {
            date: todayKey,
            foods: registeredFoods,
            total: registeredTotalFood
          };

          storage.setItem("mealHistory", JSON.stringify(mealHistory));

          selectedFoods = [];
          renderMenuList();
          updateSelectedBar();

          document.getElementById("confirmModal").style.display = "none";
          document.getElementById("selectMenuPage").style.display = "none";
          document.getElementById("detailPage").style.display = "none";
          document.getElementById("todayPage").style.display = "block";

          document.getElementById("appContainer").classList.add("has-bottom-nav");
          document.getElementById("bottomNav").style.display = "flex";
          document.getElementById("selectedBar").style.display = "none";

          renderTodayPage();
          setActiveTab(todayTab);

          window.scrollTo({
            top: 0,
            behavior: "auto"
          });
        });

      document.querySelectorAll("#backToMenuBtn, #backToMenuBtnBottom")
        .forEach(btn => {
          btn.addEventListener("click", () => {

            document.getElementById("detailPage").style.display = "none";
            document.getElementById("selectMenuPage").style.display = "block";

            window.scrollTo({
              top: 0,
              behavior: "auto"
            });

          });
        });

      document.getElementById("registerBtn")
        .addEventListener("click", () => {

          if (!selectedFood) return;

          const alreadySelected = selectedFoods.some(f => f.id === selectedFood.id);

          if (alreadySelected) {
            return;
          }

          let foodToAdd = {
            ...selectedFood,
            baseId: selectedFood.id,
            isLarge: false
          };

          const largeOptionCheck = document.getElementById("largeOptionCheck");

          if (largeOptionCheck.checked) {
            const largeOption = MENU_DATA.items.find(item =>
              item.category === selectedFood.category &&
              item.tags.includes("option")
            );

            if (largeOption) {
              foodToAdd = {
                ...foodToAdd,
                isLarge: true,
                name: `${selectedFood.name} 大盛り`,
                price: selectedFood.price + largeOption.price,
                energy_kcal: selectedFood.energy_kcal + largeOption.energy_kcal,
                protein_g: selectedFood.protein_g + largeOption.protein_g,
                fat_g: selectedFood.fat_g + largeOption.fat_g,
                carb_g: selectedFood.carb_g + largeOption.carb_g,
                salt_g: selectedFood.salt_g + largeOption.salt_g
              };
            }
          }

          selectedFoods.push(foodToAdd);

          document.getElementById("detailPage").style.display = "none";
          document.getElementById("selectMenuPage").style.display = "block";

          renderMenuList();
          updateSelectedBar();

          window.scrollTo({
            top: 0,
            behavior: "auto"
          });

        });

      document.getElementById("finishSelectBtn")
        .addEventListener("click", () => {

          if (selectedFoods.length === 0) return;

          const totalFood = makeTotalFood();

          renderConfirmModal();

          if (registeredFoods.length === 0) {
            document.getElementById("confirmRegisterBtn").textContent = "この内容で登録";
          } else {
            document.getElementById("confirmRegisterBtn").textContent = "メニューを追加";
          }

          document.getElementById("confirmModal").style.display = "flex";

          renderConfirmRadarChart();
        });

      /* =========================
         下部タブ切り替え
      ========================= */
      const todayTab = document.getElementById("todayTab");
      const aiTab = document.getElementById("aiTab");
      const menuTab = document.getElementById("menuTab");
      const mypageTab = document.getElementById("mypageTab");

      const todayPage = document.getElementById("todayPage");
      const aiPage = document.getElementById("aiPage");
      const menuPage = document.getElementById("selectMenuPage");
      const mypagePage = document.getElementById("mypagePage");

      const allTabs = [todayTab, aiTab, menuTab, mypageTab];

      function setActiveTab(activeTab) {
        allTabs.forEach(tab => tab.classList.remove("active-tab"));
        activeTab.classList.add("active-tab");
      }

      function showPage(page, activeTab) {
        todayPage.style.display = "none";
        aiPage.style.display = "none";
        menuPage.style.display = "none";
        mypagePage.style.display = "none";
        document.getElementById("detailPage").style.display = "none";

        page.style.display = "block";
        setActiveTab(activeTab);

        if (page !== menuPage) {
          document.getElementById("selectedBar").style.display = "none";
        }
        window.scrollTo({
          top: 0,
          behavior: "auto"
        });
      }
      todayTab.onclick = () => {
        showPage(todayPage, todayTab);
        renderTodayPage();
      };
      aiTab.onclick = () => showPage(aiPage, aiTab);
      menuTab.onclick = () => {
        menuMode = "select";
        renderMenuList();
        showPage(menuPage, menuTab);
        updateSelectedBar();
      };

      mypageTab.onclick = () => {
        renderMyPage();
        showPage(mypagePage, mypageTab);
      };
    </script>

</body>

</html>
