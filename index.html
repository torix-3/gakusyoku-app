<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>限界大学生の学食ナビ</title>

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
      font-family: sans-serif;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      padding-top: 20px;

      display: flex;
      flex-direction: column;

      min-height: 100vh;
    }


    /* 進行バー */

    .progress-container {
      display: flex;
      gap: 8px;
      margin-bottom: 30px;
    }

    .progress-step {
      flex: 1;
      height: 8px;
      border-radius: 10px;
      background: #ddd;
      transition: 0.3s;
    }

    .progress-step.active {
      background: #ff5722;
    }

    /* カード */

    .card {
      background: white;
      border-radius: 25px;
      padding: 30px 25px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);

      margin-top: 250px;
    }


    h2 {
      text-align: center;
      margin-bottom: 35px;
    }

    /* 質問 */

    .question {
      display: none;
    }

    .question.active {
      display: block;
    }

    label {
      display: block;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
    }

    /* 性別ボタン */

    .gender-buttons {
      display: flex;
      gap: 15px;
    }

    .gender-btn {
      flex: 1;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: #eee;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    .gender-btn.selected {
      background: #ff5722;
      color: white;
    }

    /* select */

    select {
      width: 100%;
      padding: 18px;
      border-radius: 15px;
      border: 1px solid #ccc;
      font-size: 18px;
      background: white;
    }

    /* ボタン */

    .button-area {
      margin-top: 35px;
    }

    .next-btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: #ccc;
      color: white;
      font-size: 18px;
      font-weight: bold;
      transition: 0.2s;
    }

    .next-btn.enabled {
      background: #ff5722;
      cursor: pointer;
    }

    /* おすすめ画面 */

    .recommend-screen {
      display: none;

      height: 100vh;

      justify-content: center;
      align-items: center;

      position: relative;
    }

    .food-slider {
      display: flex;
      gap: 20px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      padding-bottom: 10px;
    }

    .food-card {
      width: 85%;

      background: white;

      border-radius: 30px;

      padding: 20px;

      margin: auto;

      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .food-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 20px;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- 進行バー -->

    <div class="progress-container">
      <div class="progress-step active"></div>
      <div class="progress-step"></div>
      <div class="progress-step"></div>
      <div class="progress-step"></div>
    </div>

    <div class="card">

      <!-- 性別 -->

      <div class="question active" id="question0">

        <label>性別を選択してください</label>

        <div class="gender-buttons">

          <button class="gender-btn" data-value="male">
            男性
          </button>

          <button class="gender-btn" data-value="female">
            女性
          </button>

        </div>

      </div>

      <!-- 年齢 -->

      <div class="question" id="question1">

        <label>年齢を選択してください</label>

        <select id="age">
          <option value="">選択してください</option>
        </select>

      </div>

      <!-- 身長 -->

      <div class="question" id="question2">

        <label>身長を選択してください</label>

        <select id="height">
          <option value="">選択してください</option>
        </select>

      </div>

      <!-- 体重 -->

      <div class="question" id="question3">

        <label>体重を選択してください</label>

        <select id="weight">
          <option value="">選択してください</option>
        </select>

      </div>

      <!-- ボタン -->

      <div class="button-area">

        <button class="next-btn" id="nextBtn">
          次へ
        </button>

      </div>

    </div> <!-- card終了 -->

    <!-- おすすめ画面 -->

    <div class="recommend-screen" id="recommendScreen">

      <div class="food-slider">

        <!-- カード1 -->

        <div class="food-card">

          <img src="https://picsum.photos/300/200" class="food-image">

          <h2>唐揚げ定食</h2>

          <canvas id="radarChart"></canvas>

        </div>

        <!-- カード2 -->

        <div class="food-card">

          <img src="https://picsum.photos/301/200" class="food-image">

          <h2>カツカレー</h2>

          <canvas id="radarChart2"></canvas>

        </div>

        <!-- カード3 -->

        <div class="food-card">

          <img src="https://picsum.photos/302/200" class="food-image">

          <h2>鯖味噌定食</h2>

          <canvas id="radarChart3"></canvas>

        </div>

      </div>

    </div>

  </div> <!-- container終了 -->

  <script>

    /* データ */

    let currentStep = 0;

    const questions = document.querySelectorAll(".question");
    const progressSteps = document.querySelectorAll(".progress-step");
    const nextBtn = document.getElementById("nextBtn");

    let selectedGender = null;

    /* select生成 */

    const ageSelect = document.getElementById("age");
    for (let i = 18; i <= 30; i++) {
      ageSelect.innerHTML += `<option value="${i}">${i}歳</option>`;
    }

    const heightSelect = document.getElementById("height");
    for (let i = 140; i <= 200; i++) {
      heightSelect.innerHTML += `<option value="${i}">${i}cm</option>`;
    }

    const weightSelect = document.getElementById("weight");
    for (let i = 40; i <= 120; i++) {
      weightSelect.innerHTML += `<option value="${i}">${i}kg</option>`;
    }

    /* 性別 */

    const genderButtons = document.querySelectorAll(".gender-btn");

    genderButtons.forEach(btn => {

      btn.addEventListener("click", () => {

        genderButtons.forEach(b => {
          b.classList.remove("selected");
        });

        btn.classList.add("selected");

        selectedGender = btn.dataset.value;

        enableButton();
      });

    });

    /* select変更 */

    document.querySelectorAll("select").forEach(select => {

      select.addEventListener("change", () => {

        if (select.value !== "") {
          enableButton();
        }

      });

    });

    /* ボタン有効化 */

    function enableButton() {
      nextBtn.classList.add("enabled");
    }

    /* 次へ */

    nextBtn.addEventListener("click", () => {

      /* 入力チェック */

      if (currentStep === 0 && !selectedGender) {
        return;
      }

      if (currentStep === 1 && ageSelect.value === "") {
        return;
      }

      if (currentStep === 2 && heightSelect.value === "") {
        return;
      }

      if (currentStep === 3 && weightSelect.value === "") {
        return;
      }

      /* 最後 */

      if (currentStep === 3) {

        /* 進行バーを消す */

        document.querySelector(".progress-container").style.display = "none";

        /* 質問画面を消す */

        document.querySelector(".card").style.display = "none";

        /* おすすめ画面表示 */

        document.getElementById("recommendScreen").style.display = "flex";

        return;
      }

      /* 次へ進む */

      questions[currentStep].classList.remove("active");

      currentStep++;

      questions[currentStep].classList.add("active");

      progressSteps[currentStep].classList.add("active");

      nextBtn.classList.remove("enabled");

    });

  </script>

</body>

</html>
