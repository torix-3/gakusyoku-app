<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>限界大学生の学食ナビ</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f5f5f5;
      font-family: sans-serif;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      height: 100vh;
      padding: 16px;
      position: relative;
    }

    /* =========================
       進行バー
    ========================= */

    .progress-container {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .progress-step {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: #ddd;
      transition: 0.3s;
    }

    .progress-step.active {
      background: #ff5722;
    }

    /* =========================
       入力カード
    ========================= */

    .card {
      background: white;
      border-radius: 28px;
      padding: 30px 24px;

      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);

      height: calc(100vh - 70px);

      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .question {
      display: none;
    }

    .question.active {
      display: block;
    }

    label {
      display: block;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 40px;
    }

    /* =========================
       性別ボタン
    ========================= */

    .gender-buttons {
      display: flex;
      gap: 16px;
    }

    .gender-btn {
      flex: 1;

      border: none;

      border-radius: 20px;

      padding: 20px;

      font-size: 22px;
      font-weight: bold;

      background: #e5e5e5;

      transition: 0.2s;
    }

    .gender-btn.selected {
      background: #ff5722;
      color: white;
    }

    /* =========================
       select
    ========================= */

    select {
      width: 100%;

      padding: 20px;

      border-radius: 20px;

      border: 1px solid #ddd;

      font-size: 22px;

      background: white;
    }

    /* =========================
       次へ
    ========================= */

    .button-area {
      margin-top: 40px;
    }

    .next-btn {
      width: 100%;

      padding: 20px;

      border: none;

      border-radius: 20px;

      background: #ccc;

      color: white;

      font-size: 22px;
      font-weight: bold;

      transition: 0.2s;
    }

    .next-btn.enabled {
      background: #ff5722;
    }

    /* =========================
       おすすめ画面
    ========================= */

    .recommend-screen {
      display: none;

      width: 100%;
      height: 100vh;

      justify-content: center;
      align-items: center;

      position: relative;
    }

    /* =========================
       料理カード
    ========================= */

    .food-card {
      width: 100%;
      height: calc(100vh - 32px);

      background: white;

      border-radius: 35px;

      padding: 20px;

      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);

      display: flex;
      flex-direction: column;
      justify-content: space-between;

      position: relative;
    }

    .food-image {
      width: 100%;
      height: 30vh;

      object-fit: cover;

      border-radius: 24px;
    }

    .food-title {
      text-align: center;

      font-size: 40px;
      font-weight: bold;

      margin-top: 10px;
      margin-bottom: 10px;
    }

    /* =========================
       グラフ
    ========================= */

    .chart-area {
      flex: 1;

      position: relative;

      min-height: 0;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* =========================
       矢印
    ========================= */

    .arrow-btn {
      position: absolute;

      top: 50%;
      transform: translateY(-50%);

      width: 65px;
      height: 65px;

      border: none;
      border-radius: 50%;

      background: white;

      font-size: 32px;

      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.15);

      z-index: 10;
    }

    .left-btn {
      left: -10px;
    }

    .right-btn {
      right: -10px;
    }

    /* =========================
       スマホ最適化
    ========================= */

    @media (max-height: 750px) {

      label {
        font-size: 24px;
        margin-bottom: 28px;
      }

      .food-title {
        font-size: 32px;
      }

      .food-image {
        height: 24vh;
      }

      .arrow-btn {
        width: 56px;
        height: 56px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- 進行バー -->

    <div class="progress-container">

      <div class="progress-step active"></div>
      <div class="progress-step"></div>
      <div class="progress-step"></div>
      <div class="progress-step"></div>

    </div>

    <!-- 入力画面 -->

    <div class="card">

      <!-- 性別 -->

      <div class="question active">

        <label>性別を選択してください</label>

        <div class="gender-buttons">

          <button class="gender-btn" data-value="male">
            男性
          </button>

          <button class="gender-btn" data-value="female">
            女性
          </button>

        </div>

      </div>

      <!-- 年齢 -->

      <div class="question">

        <label>年齢を選択してください</label>

        <select id="age">
          <option value="">選択してください</option>
        </select>

      </div>

      <!-- 身長 -->

      <div class="question">

        <label>身長を選択してください</label>

        <select id="height">
          <option value="">選択してください</option>
        </select>

      </div>

      <!-- 体重 -->

      <div class="question">

        <label>体重を選択してください</label>

        <select id="weight">
          <option value="">選択してください</option>
        </select>

      </div>

      <!-- 次へ -->

      <div class="button-area">

        <button class="next-btn" id="nextBtn">
          次へ
        </button>

      </div>

    </div>

    <!-- おすすめ画面 -->

    <div class="recommend-screen" id="recommendScreen">

      <!-- 左 -->

      <button class="arrow-btn left-btn" id="prevBtn">
        ←
      </button>

      <!-- カード -->

      <div class="food-card">

        <img id="foodImage" class="food-image">

        <div class="food-title" id="foodTitle"></div>

        <div class="chart-area">

          <canvas id="radarChart"></canvas>

        </div>

      </div>

      <!-- 右 -->

      <button class="arrow-btn right-btn" id="nextFoodBtn">
        →
      </button>

    </div>

  </div>

  <script>

    /* =========================
       基本
    ========================= */

    let currentStep = 0;

    const questions =
      document.querySelectorAll(".question");

    const progressSteps =
      document.querySelectorAll(".progress-step");

    const nextBtn =
      document.getElementById("nextBtn");

    let selectedGender = null;

    /* =========================
       保存データ取得
    ========================= */

    const savedGender =
      localStorage.getItem("gender");

    const savedAge =
      localStorage.getItem("age");

    const savedHeight =
      localStorage.getItem("height");

    const savedWeight =
      localStorage.getItem("weight");

    /* =========================
       select生成
    ========================= */

    const ageSelect =
      document.getElementById("age");

    for (let i = 18; i <= 30; i++) {

      ageSelect.innerHTML += `
        <option value="${i}">
          ${i}歳
        </option>
      `;
    }

    const heightSelect =
      document.getElementById("height");

    for (let i = 140; i <= 200; i++) {

      heightSelect.innerHTML += `
        <option value="${i}">
          ${i}cm
        </option>
      `;
    }

    const weightSelect =
      document.getElementById("weight");

    for (let i = 40; i <= 120; i++) {

      weightSelect.innerHTML += `
        <option value="${i}">
          ${i}kg
        </option>
      `;
    }

    /* =========================
       保存データ反映
    ========================= */

    if (savedGender) {

      selectedGender = savedGender;

      document
        .querySelector(`[data-value="${savedGender}"]`)
        .classList.add("selected");
    }

    if (savedAge) {
      ageSelect.value = savedAge;
    }

    if (savedHeight) {
      heightSelect.value = savedHeight;
    }

    if (savedWeight) {
      weightSelect.value = savedWeight;
    }

    /* =========================
       保存データあるなら
       最初からボタン有効
    ========================= */

    if (
      savedGender ||
      savedAge ||
      savedHeight ||
      savedWeight
    ) {

      nextBtn.classList.add("enabled");

    }

    /* =========================
       性別
    ========================= */

    const genderButtons =
      document.querySelectorAll(".gender-btn");

    genderButtons.forEach(btn => {

      btn.addEventListener("click", () => {

        genderButtons.forEach(b => {
          b.classList.remove("selected");
        });

        btn.classList.add("selected");

        selectedGender =
          btn.dataset.value;

        enableButton();

      });

    });

    /* =========================
       select
    ========================= */

    document
      .querySelectorAll("select")
      .forEach(select => {

        select.addEventListener("change", () => {

          if (select.value !== "") {

            enableButton();

          }

        });

      });

    /* =========================
       ボタン有効化
    ========================= */

    function enableButton() {

      nextBtn.classList.add("enabled");

    }

    /* =========================
       次へ
    ========================= */

    nextBtn.addEventListener("click", () => {

      if (
        currentStep === 0 &&
        !selectedGender
      ) return;

      if (
        currentStep === 1 &&
        ageSelect.value === ""
      ) return;

      if (
        currentStep === 2 &&
        heightSelect.value === ""
      ) return;

      if (
        currentStep === 3 &&
        weightSelect.value === ""
      ) return;

      /* 最後 */

      if (currentStep === 3) {

        /* 保存 */

        localStorage.setItem(
          "gender",
          selectedGender
        );

        localStorage.setItem(
          "age",
          ageSelect.value
        );

        localStorage.setItem(
          "height",
          heightSelect.value
        );

        localStorage.setItem(
          "weight",
          weightSelect.value
        );

        /* 非表示 */

        document
          .querySelector(".progress-container")
          .style.display = "none";

        document
          .querySelector(".card")
          .style.display = "none";

        /* 表示 */

        document
          .getElementById("recommendScreen")
          .style.display = "flex";

        radarChart.resize();

        return;
      }

      /* 次 */

      questions[currentStep]
        .classList.remove("active");

      currentStep++;

      questions[currentStep]
        .classList.add("active");

      progressSteps[currentStep]
        .classList.add("active");

      nextBtn.classList.remove("enabled");

      /* 保存データあるなら
         次も押せるようにする */

      if (
        currentStep === 1 &&
        ageSelect.value !== ""
      ) {
        nextBtn.classList.add("enabled");
      }

      if (
        currentStep === 2 &&
        heightSelect.value !== ""
      ) {
        nextBtn.classList.add("enabled");
      }

      if (
        currentStep === 3 &&
        weightSelect.value !== ""
      ) {
        nextBtn.classList.add("enabled");
      }

    });

    /* =========================
       食事データ
    ========================= */

    const foods = [

      {
        title: "唐揚げ定食",
        image: "https://picsum.photos/300/200",
        data: [8, 6, 7, 3, 10]
      },

      {
        title: "カツカレー",
        image: "https://picsum.photos/301/200",
        data: [7, 9, 10, 2, 10]
      },

      {
        title: "鯖味噌定食",
        image: "https://picsum.photos/302/200",
        data: [8, 5, 6, 9, 7]
      }

    ];

    let currentFood = 0;

    /* =========================
       要素
    ========================= */

    const foodTitle =
      document.getElementById("foodTitle");

    const foodImage =
      document.getElementById("foodImage");

    /* =========================
       グラフ
    ========================= */

    const ctx =
      document.getElementById("radarChart");

    const radarChart =
      new Chart(ctx, {

        type: "radar",

        data: {

          labels: [
            "タンパク質",
            "脂質",
            "炭水化物",
            "ビタミン",
            "満足度"
          ],

          datasets: [

            /* 理想 */

            {
              label: "理想",

              data: [8, 8, 8, 8, 8],

              borderColor: "#999",

              backgroundColor: "transparent",

              borderWidth: 3,

              pointBackgroundColor: "#999"
            },

            /* 実際 */

            {
              label: "実際",

              data: [],

              borderColor: "#ff5722",

              backgroundColor:
                "rgba(255,87,34,0.35)",

              borderWidth: 3,

              pointBackgroundColor: "#ff5722"
            }

          ]

        },

        options: {

          responsive: true,

          maintainAspectRatio: false,

          animation: false,

          plugins: {

            legend: {

              labels: {

                font: {
                  size: 20
                }

              }

            }

          },

          scales: {

            r: {

              min: 0,
              max: 10,

              ticks: {

                stepSize: 2,

                font: {
                  size: 16
                }

              },

              pointLabels: {

                font: {
                  size: 24
                }

              }

            }

          }

        }

      });

    /* =========================
       表示更新
    ========================= */

    function updateFood() {

      const food = foods[currentFood];

      foodTitle.textContent =
        food.title;

      foodImage.src =
        food.image;

      radarChart.data.datasets[1].data =
        food.data;

      radarChart.update();

    }

    updateFood();

    /* =========================
       右
    ========================= */

    document
      .getElementById("nextFoodBtn")
      .addEventListener("click", () => {

        currentFood++;

        if (
          currentFood >= foods.length
        ) {

          currentFood = 0;

        }

        updateFood();

      });

    /* =========================
       左
    ========================= */

    document
      .getElementById("prevBtn")
      .addEventListener("click", () => {

        currentFood--;

        if (
          currentFood < 0
        ) {

          currentFood =
            foods.length - 1;

        }

        updateFood();

      });

  </script>

</body>

</html>
